<!DOCTYPE html>
<html>
<head>
    <title>Jogo da Adivinhação</title>
    <style>
        body {
            background-color: black;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        h1 { font-size: 32px; text-align: center; }
        input { padding: 10px; font-size: 18px; border-radius: 8px; border: none; }
        button { padding: 10px 20px; font-size: 18px; background-color: white; color: blue; border: none; border-radius: 8px; }
        p { text-align: center; font-size: 20px; }
    </style>
</head>
<body>
    <h1>Jogo da Adivinhação</h1>
    <p>Tente adivinhar o número entre 1 e 100!</p>
    <input type="number" id="palpite" placeholder="Digite seu palpite">
    <button onclick="verificar()">Tentar</button>
    <p id="mensagem"></p>

    <script>
        let numeroSecreto = Math.floor(Math.random() * 100) + 1
        let tentativas = 0

        function verificar() {
            let palpite = parseInt(document.getElementById("palpite").value)

            if (isNaN(palpite)) {
                document.getElementById("mensagem").textContent = "Digite um número primeiro!"
                return
            }

            tentativas++

            if (palpite < numeroSecreto) {
                document.getElementById("mensagem").textContent = "É maior! Tenta de novo."
            } else if (palpite > numeroSecreto) {
                document.getElementById("mensagem").textContent = "É menor! Tenta de novo."
            } else {
                document.getElementById("mensagem").textContent = "Parabéns! Você acertou em " + tentativas + " tentativas!"
            }
        }
    </script>
</body>
</html>
